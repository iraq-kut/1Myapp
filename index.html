<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحميل التطبيق</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Cairo',sans-serif;
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}

.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top right,#2563eb33,transparent 35%),
    radial-gradient(circle at bottom left,#06b6d433,transparent 35%);
    z-index:-1;
}

.container{
    width:100%;
    max-width:430px;
    margin:auto;
    padding:25px;
}

.card{
    margin-top:40px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:30px;
    padding:30px 25px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.35);
}

.logo{
    width:120px;
    height:120px;
    border-radius:28px;
    object-fit:cover;
    border:4px solid rgba(255,255,255,0.08);
    box-shadow:0 0 25px rgba(37,99,235,0.4);
}

h1{
    margin-top:18px;
    font-size:30px;
    font-weight:900;
}

.desc{
    margin-top:10px;
    color:#cbd5e1;
    line-height:1.9;
    font-size:15px;
}

.info-box{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
    gap:10px;
}

.info{
    flex:1;
    background:rgba(255,255,255,0.04);
    padding:15px;
    border-radius:18px;
}

.info h2{
    font-size:18px;
    margin-bottom:6px;
}

.info p{
    color:#94a3b8;
    font-size:13px;
}

.download-btn{
    display:block;
    width:100%;
    margin-top:30px;
    background:linear-gradient(45deg,#2563eb,#06b6d4);
    color:white;
    text-decoration:none;
    padding:18px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(37,99,235,0.4);
}

.download-btn:hover{
    transform:translateY(-3px);
}

.features{
    margin-top:30px;
    text-align:right;
}

.features h3{
    margin-bottom:15px;
    font-size:20px;
}

.feature{
    background:rgba(255,255,255,0.04);
    margin-bottom:12px;
    padding:14px;
    border-radius:15px;
    color:#dbeafe;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#94a3b8;
    font-size:13px;
}

.version{
    margin-top:15px;
    color:#38bdf8;
    font-size:14px;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="card">

<img class="logo" src="icon.png">

<h1>Faustus Tv </h1>

<p class="desc">
تطبيق احترافي سريع وآمن يوفر أفضل تجربة للمستخدم
مع تصميم عصري وسهولة بالاستخدام.
</p>

<div class="version">
الإصدار 1.0.0
</div>

<div class="info-box">

<div class="info">
<h2>10K+</h2>
<p>تحميل</p>
</div>

<div class="info">
<h2>4.9</h2>
<p>التقييم</p>
</div>

<div class="info">
<h2>APK</h2>
<p>أندرويد</p>
</div>

</div>

<a class="download-btn" href="app.apk" download>
تحميل التطبيق
</a>

<div class="features">

<h3>مميزات التطبيق</h3>

<div class="feature">
⚡ سرعة عالية وأداء ممتاز
</div>

<div class="feature">
🔒 حماية وأمان للمستخدم
</div>

<div class="feature">
🎨 واجهة حديثة وجذابة
</div>

<div class="feature">
📱 يعمل على أغلب الأجهزة
</div>

</div>

<div class="footer">
© جميع الحقوق محفوظة
</div>

</div>

</div>

</body>
</html>
